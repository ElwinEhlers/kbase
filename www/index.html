<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dokubase</title>
<link id="favicon" rel="icon">
<style>
.icon { width: 24px; height: 24px; fill: currentColor; display: inline-block; flex-shrink: 0; vertical-align: middle; pointer-events: none; }
.icon-sm { width: 16px; height: 16px; }
.icon-md { width: 20px; height: 20px; }
.icon-lg { width: 36px; height: 36px; }
</style>
<style>
/* ── MD3 Blue Dark Theme ─────────────────────────────────────────────────── */
:root {
  --md-primary:               #92CBFF;
  --md-on-primary:            #003351;
  --md-primary-container:     #004A72;
  --md-on-primary-container:  #CCE5FF;
  --md-secondary:             #B3CAE0;
  --md-on-secondary:          #1D3345;
  --md-secondary-container:   #354A5D;
  --md-on-secondary-container:#CFE6FF;
  --md-error:                 #FFB4AB;
  --md-on-error:              #690005;
  --md-background:            #0F1417;
  --md-on-background:         #DEE3E9;
  --md-surface:               #0F1417;
  --md-on-surface:            #DEE3E9;
  --md-surface-variant:       #41484F;
  --md-on-surface-variant:    #C1C8CF;
  --md-outline:               #8B9198;
  --md-outline-variant:       #41484F;
  /* tonal elevation surfaces */
  --surf-1: #161D22;
  --surf-2: #1A2228;
  --surf-3: #1E2730;
  --surf-5: #222D36;
  --nav-w:    256px;
  --header-h: 64px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, sans-serif;
  background: var(--md-background);
  color: var(--md-on-background);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* ── TOP APP BAR ─────────────────────────────────────────────────────────── */
header {
  height: var(--header-h);
  background: var(--surf-2);
  display: flex;
  align-items: center;
  padding: 0 8px 0 4px;
  gap: 4px;
  flex-shrink: 0;
  z-index: 100;
  border-bottom: 1px solid var(--md-outline-variant);
}

.icon-btn {
  width: 48px; height: 48px;
  border-radius: 50%;
  border: none;
  background: none;
  color: var(--md-on-surface-variant);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  transition: color .2s;
  flex-shrink: 0;
}
.icon-btn:hover { color: var(--md-on-surface); }
.icon-btn::after {
  content: ''; position: absolute; inset: 0; border-radius: 50%;
  background: currentColor; opacity: 0; transition: opacity .2s;
}
.icon-btn:hover::after  { opacity: .08; }
.icon-btn:active::after { opacity: .16; }

.app-title {
  font-size: 1.375rem;
  font-weight: 400;
  color: var(--md-on-surface);
  flex: 1;
  padding-left: 4px;
}
.app-title strong { font-weight: 500; color: var(--md-primary); }

/* ── LAYOUT ──────────────────────────────────────────────────────────────── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ── NAVIGATION DRAWER ───────────────────────────────────────────────────── */
nav {
  width: var(--nav-w);
  background: var(--surf-1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width .3s cubic-bezier(.2,0,0,1);
  flex-shrink: 0;
  border-right: 1px solid var(--md-outline-variant);
}
nav.collapsed { width: 0; }

.nav-header { padding: 16px 16px 8px; flex-shrink: 0; }

.search-bar {
  display: flex;
  align-items: center;
  background: var(--surf-3);
  border-radius: 28px;
  padding: 0 16px;
  height: 48px;
  gap: 8px;
}
.search-bar .icon { color: var(--md-on-surface-variant); }
.search-bar input {
  flex: 1; background: none; border: none; outline: none;
  font-family: system-ui, sans-serif;
  font-size: 1rem; font-weight: 400;
  color: var(--md-on-surface); min-width: 0;
}
.search-bar input::placeholder { color: var(--md-on-surface-variant); }

.nav-list { overflow-y: auto; flex: 1; padding: 4px 8px; }
.nav-list::-webkit-scrollbar { width: 4px; }
.nav-list::-webkit-scrollbar-thumb { background: var(--md-outline-variant); border-radius: 2px; }

.nav-group { display: flex; flex-direction: column; }

.nav-item-ghost {
  opacity: .4;
  background: var(--md-primary-container) !important;
  border-radius: 28px;
}
.nav-section-label {
  padding: 16px 16px 4px;
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--md-on-surface-variant);
  user-select: none;
  white-space: nowrap;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  height: 56px;
  border-radius: 28px;
  cursor: pointer;
  font-size: 0.875rem;
  font-weight: 500;
  letter-spacing: 0.006em;
  color: var(--md-on-surface-variant);
  transition: background .2s, color .2s;
  position: relative;
  overflow: hidden;
  white-space: nowrap;
}
.nav-item::after {
  content: ''; position: absolute; inset: 0; border-radius: inherit;
  background: var(--md-on-surface-variant); opacity: 0; transition: opacity .2s;
  pointer-events: none;
}
.nav-item:hover::after  { opacity: .08; }
.nav-item:active::after { opacity: .16; }
.nav-item.active {
  background: var(--md-primary-container);
  color: var(--md-on-primary-container);
}
.nav-item.active::after { background: var(--md-on-primary-container); }
.nav-item .icon { flex-shrink: 0; }
.drag-handle { position: relative; z-index: 1; cursor: grab; opacity: .4; pointer-events: auto; }
.nav-label { flex: 1; overflow: hidden; text-overflow: ellipsis; }

.nav-badge {
  font-size: 0.6875rem; font-weight: 500;
  background: var(--md-secondary-container);
  color: var(--md-on-secondary-container);
  border-radius: 100px; padding: 2px 8px; flex-shrink: 0;
}
.nav-item.active .nav-badge {
  background: var(--md-primary);
  color: var(--md-on-primary);
}

/* ── MAIN ────────────────────────────────────────────────────────────────── */
main { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }

.tab-bar {
  background: var(--surf-2);
  border-bottom: 1px solid var(--md-outline-variant);
  display: flex;
  align-items: flex-end;
  padding: 0 8px;
  gap: 2px;
  flex-shrink: 0;
  overflow-x: auto;
  min-height: 48px;
}
.tab-bar::-webkit-scrollbar { height: 2px; }
.tab-bar::-webkit-scrollbar-thumb { background: var(--md-outline-variant); }

.tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 12px 16px;
  font-family: system-ui, sans-serif;
  font-size: 0.875rem;
  font-weight: 500;
  letter-spacing: 0.006em;
  color: var(--md-on-surface-variant);
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: color .2s, border-color .2s;
  position: relative;
  flex-shrink: 0;
}
.tab::after {
  content: ''; position: absolute; inset: 0;
  background: var(--md-on-surface-variant); opacity: 0; transition: opacity .2s;
}
.tab:hover::after  { opacity: .08; }
.tab:active::after { opacity: .12; }
.tab.active { color: var(--md-primary); border-bottom-color: var(--md-primary); }
.tab.active::after { background: var(--md-primary); }

.tab-close {
  opacity: 0; transition: opacity .15s;
  z-index: 1;
}
.tab:hover .tab-close, .tab.active .tab-close { opacity: 1; }

.frame-container { flex: 1; position: relative; }
iframe {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  border: none; background: #fff; display: none;
}
iframe.active { display: block; }
object.active { display: block !important; }

/* ── WELCOME ─────────────────────────────────────────────────────────────── */
#welcome {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px; padding: 40px;
  background: var(--md-background);
}

.welcome-icon {
  width: 72px; height: 72px; border-radius: 50%;
  background: var(--md-primary-container);
  display: flex; align-items: center; justify-content: center;
}
.welcome-icon .icon { color: var(--md-on-primary-container); }

#welcome h1 {
  font-size: 2rem; font-weight: 300;
  color: var(--md-on-surface);
  text-align: center; line-height: 1.3;
}
#welcome h1 span { color: var(--md-primary); font-weight: 400; }

#welcome p {
  font-size: 0.875rem;
  color: var(--md-on-surface-variant);
  text-align: center; max-width: 380px;
  line-height: 1.6; font-weight: 400;
}

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(172px, 1fr));
  gap: 12px; width: 100%; max-width: 720px; margin-top: 8px;
}

.quick-card {
  background: var(--surf-2);
  border: 1px solid var(--md-outline-variant);
  border-radius: 16px;
  padding: 20px 16px 16px;
  cursor: pointer;
  display: flex; flex-direction: column; gap: 8px;
  position: relative; overflow: hidden;
  transition: box-shadow .2s;
}
.quick-card::after {
  content: ''; position: absolute; inset: 0; border-radius: inherit;
  background: var(--md-primary); opacity: 0; transition: opacity .2s;
}
.quick-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.4); }
.quick-card:hover::after  { opacity: .08; }
.quick-card:active::after { opacity: .14; }
.quick-card .icon { color: var(--md-primary); z-index: 1; }
.card-label { font-size: 0.875rem; font-weight: 500; color: var(--md-on-surface); z-index: 1; }
.card-sub   { font-size: 0.75rem;  font-weight: 400; color: var(--md-on-surface-variant); z-index: 1; }

/* ── CONTEXT MENU ────────────────────────────────────────────────────────── */
#ctx-menu {
  position: fixed;
  background: var(--surf-5);
  border-radius: 8px;
  padding: 8px 0;
  z-index: 600;
  display: none; flex-direction: column;
  min-width: 168px;
  box-shadow: 0 4px 8px 3px rgba(0,0,0,.3), 0 1px 3px rgba(0,0,0,.2);
}
#ctx-menu.open { display: flex; }

.ctx-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  font-family: system-ui, sans-serif;
  font-size: 0.875rem; font-weight: 400;
  color: var(--md-on-surface);
  cursor: pointer; position: relative; overflow: hidden;
}
.ctx-item::after {
  content: ''; position: absolute; inset: 0;
  background: var(--md-on-surface); opacity: 0; transition: opacity .2s;
}
.ctx-item:hover::after  { opacity: .08; }
.ctx-item:active::after { opacity: .14; }
.ctx-item.danger { color: var(--md-error); }
.ctx-item.danger::after { background: var(--md-error); }
.ctx-item .icon { color: var(--md-on-surface-variant); }
.ctx-item.danger .icon { color: var(--md-error); }

/* ── STATUS BAR ──────────────────────────────────────────────────────────── */
.status-bar {
  height: 24px;
  background: var(--surf-1);
  border-top: 1px solid var(--md-outline-variant);
  display: flex; align-items: center;
  padding: 0 16px; gap: 16px;
  font-size: 0.6875rem; font-weight: 400;
  color: var(--md-on-surface-variant);
  flex-shrink: 0; letter-spacing: 0.02em;
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: #69d68c; flex-shrink: 0; }
.status-bar .spacer { flex: 1; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--md-outline-variant); border-radius: 3px; }

/* ── DRAG & DROP ZONE ────────────────────────────────────────────────────── */
.drop-zone {
  margin: 8px;
  border: 1.5px dashed var(--md-outline-variant);
  border-radius: 12px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  flex-shrink: 0;
}
.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--md-primary);
  background: rgba(146,203,255,.06);
}
.drop-zone .icon { color: var(--md-on-surface-variant); }
.drop-zone span { font-size: 0.72rem; color: var(--md-on-surface-variant); text-align: center; }
.drop-zone input[type=file] { display: none; }

/* Upload progress toast */
#upload-toast {
  position: fixed;
  bottom: 36px; left: 50%; transform: translateX(-50%);
  background: var(--surf-5);
  color: var(--md-on-surface);
  border-radius: 8px;
  padding: 10px 20px;
  font-size: 0.8rem;
  display: none;
  box-shadow: 0 4px 12px rgba(0,0,0,.4);
  z-index: 700;
  gap: 8px;
  align-items: center;
}
#upload-toast.show { display: flex; }

/* ── FAB ─────────────────────────────────────────────────────────────────── */
.fab {
  display: flex; align-items: center; gap: 8px;
  padding: 0 16px;
  height: 40px;
  border-radius: 20px;
  border: none;
  background: var(--md-primary-container);
  color: var(--md-on-primary-container);
  font-family: system-ui, sans-serif;
  font-size: 0.875rem; font-weight: 500;
  letter-spacing: 0.006em;
  cursor: pointer;
  position: relative; overflow: hidden;
  transition: box-shadow .2s;
  flex-shrink: 0;
}
.fab::after {
  content: ''; position: absolute; inset: 0; border-radius: inherit;
  background: var(--md-on-primary-container); opacity: 0; transition: opacity .2s;
}
.fab:hover { box-shadow: 0 2px 6px rgba(0,0,0,.4); }
.fab:hover::after  { opacity: .08; }
.fab:active::after { opacity: .14; }
.fab .icon { }

/* ── MD3 DIALOG ──────────────────────────────────────────────────────────── */
#dialog-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6);
  display: none; align-items: center; justify-content: center;
  z-index: 800;
}
#dialog-overlay.open { display: flex; }

#dialog {
  background: var(--surf-3);
  border-radius: 28px;
  padding: 24px;
  width: 440px;
  max-width: calc(100vw - 48px);
  display: flex; flex-direction: column; gap: 16px;
  box-shadow: 0 8px 12px 6px rgba(0,0,0,.3), 0 4px 4px rgba(0,0,0,.2);
}

#dialog h2 {
  font-size: 1.5rem; font-weight: 400;
  color: var(--md-on-surface);
  letter-spacing: 0;
}

.d-field { display: flex; flex-direction: column; gap: 4px; }

/* MD3 Outlined Text Field */
.md-field {
  position: relative;
  height: 56px;
}
.md-field input, .md-field select {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  background: transparent;
  border: 1px solid var(--md-outline);
  border-radius: 4px;
  color: var(--md-on-surface);
  font-family: system-ui, sans-serif;
  font-size: 1rem; font-weight: 400;
  padding: 16px 16px 0;
  outline: none;
  transition: border-color .2s;
  appearance: none;
}
.md-field input:focus, .md-field select:focus {
  border-color: var(--md-primary);
  border-width: 2px;
}
.md-field label {
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  font-size: 1rem; font-weight: 400;
  color: var(--md-on-surface-variant);
  background: var(--surf-3);
  padding: 0 4px;
  pointer-events: none;
  transition: top .15s, font-size .15s, color .15s, transform .15s;
}
.md-field input:focus ~ label,
.md-field input:not(:placeholder-shown) ~ label,
.md-field select:focus ~ label,
.md-field.has-val label {
  top: 0; transform: translateY(-50%);
  font-size: 0.75rem;
  color: var(--md-primary);
}
.md-field input:not(:focus):not(:placeholder-shown) ~ label,
.md-field.has-val:not(:focus-within) label { color: var(--md-on-surface-variant); }

.md-field select option { background: var(--surf-3); color: var(--md-on-surface); }

.dialog-actions {
  display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px;
}

.d-btn {
  height: 40px; padding: 0 24px;
  border-radius: 20px; border: none;
  font-family: system-ui, sans-serif;
  font-size: 0.875rem; font-weight: 500;
  letter-spacing: 0.006em;
  cursor: pointer;
  position: relative; overflow: hidden;
  transition: box-shadow .2s;
}
.d-btn::after {
  content: ''; position: absolute; inset: 0; border-radius: inherit;
  opacity: 0; transition: opacity .2s;
}
.d-btn:hover::after  { opacity: .08; }
.d-btn:active::after { opacity: .14; }

.d-btn-text {
  background: none;
  color: var(--md-primary);
}
.d-btn-text::after { background: var(--md-primary); }

.d-btn-filled {
  background: var(--md-primary);
  color: var(--md-on-primary);
}
.d-btn-filled::after { background: var(--md-on-primary); }
.d-btn-filled:hover { box-shadow: 0 2px 4px rgba(0,0,0,.3); }

.d-btn-error {
  background: none;
  color: var(--md-error);
}
.d-btn-error::after { background: var(--md-error); }
</style>

  <symbol id="i-close"    viewBox="0 0 24 24"><path d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></symbol>

</svg>

<header>
  <button class="icon-btn" id="toggle-nav" title="Navigation ein/ausblenden">
    <svg class="icon"><use href="#i-menu"></use></svg>
  </button>
  <div class="app-title"><strong id="app-username"></strong> dokubase</div>
  <button class="fab" id="btn-add">
    <svg class="icon"><use href="#i-add"></use></svg>Seite
  </button>
</header>

<div class="layout">
  <nav id="nav">
    <div class="nav-header">
      <div class="search-bar">
        <svg class="icon icon-md"><use href="#i-search"></use></svg>
        <input type="text" id="search-input" placeholder="Suchen…" autocomplete="off">
      </div>
    </div>
    <div class="nav-list" id="nav-list"></div>
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept=".html,.htm,.pdf">
      <svg class="icon"><use href="#i-upload"></use></svg>
      <span>HTML / PDF<br>hierher ziehen</span>
    </div>
  </nav>

  <main>
    <div class="tab-bar" id="tab-bar"></div>
    <div class="frame-container" id="frame-container">
      <div id="welcome">
        <div class="welcome-icon">
          <svg class="icon icon-lg"><use href="#i-menubook"></use></svg>
        </div>
        <h1>Willkommen, <span id="welcome-username"></span></h1>
        <p>Wähle eine Seite aus der Navigation oder klicke auf eine Kachel.</p>
        <div class="card-grid" id="quick-cards"></div>
      </div>
    </div>
  </main>
</div>

<div class="status-bar">
  <div class="status-dot"></div>
  <span>lokal</span>
  <span id="status-page">Keine Seite geöffnet</span>
  <span class="spacer"></span>
  <span id="status-count">0 Seiten</span>
</div>

<div id="upload-toast">
  <svg class="icon icon-sm"><use href="#i-hourglass"></use></svg>
  <span id="upload-toast-msg">Wird hochgeladen…</span>
</div>

<div id="ctx-menu">
  <div class="ctx-item" id="ctx-open">
    <svg class="icon"><use href="#i-open"></use></svg>Öffnen
  </div>
  <div class="ctx-item" id="ctx-edit">
    <svg class="icon"><use href="#i-edit"></use></svg>Bearbeiten
  </div>
  <div class="ctx-item" id="ctx-close-tab">
    <svg class="icon"><use href="#i-close"></use></svg>Tab schließen
  </div>
  <div class="ctx-item danger" id="ctx-delete">
    <svg class="icon"><use href="#i-delete"></use></svg>Aus Liste löschen
  </div>
</div>

<!-- MD3 DIALOG -->
<div id="dialog-overlay">
  <div id="dialog">
    <h2 id="dialog-title">Seite hinzufügen</h2>

    <div class="d-field">
      <div class="md-field">
        <input type="text" id="d-title" placeholder=" " autocomplete="off">
        <label>Titel</label>
      </div>
    </div>

    <div class="d-field">
      <div class="md-field">
        <input type="text" id="d-path" placeholder=" " autocomplete="off">
        <label>Pfad (z.B. ./freebsd.html)</label>
      </div>
    </div>

    <div class="d-field">
      <div class="md-field has-val" id="d-cat-field">
        <select id="d-cat"></select>
        <label>Kategorie</label>
      </div>
    </div>

    <div class="d-field">
      <div class="md-field">
        <input type="text" id="d-newcat" placeholder=" " autocomplete="off">
        <label>Neue Kategorie (optional)</label>
      </div>
    </div>

    <div class="dialog-actions">
      <button class="d-btn d-btn-error" id="d-delete" style="display:none;margin-right:auto">Löschen</button>
      <button class="d-btn d-btn-text"   id="d-cancel">Abbrechen</button>
      <button class="d-btn d-btn-filled" id="d-save">Speichern</button>
    </div>
  </div>
</div>

<script>
const USER = 'sbin'; // ← hier den Benutzernamen anpassen
document.title = USER + ' · dokubase';
document.getElementById('app-username').textContent = USER;
document.getElementById('welcome-username').textContent = USER;

const DEFAULT_PAGES = [
  { id: 1, title: 'FreeBSD Guide',    path: './docs/freebsd-guide.html', cat: 'System' },
  { id: 2, title: 'ComfyUI + FLUX.1', path: './docs/fluy/index.html',    cat: 'AI'     },
];

const cats = ['System', 'Network', 'Storage', 'Dev', 'AI', 'Sonstiges'];
const catIcons = {
  System: 'terminal', Network: 'lan', Storage: 'storage',
  Dev: 'code', AI: 'ai', Sonstiges: 'folder', _other: 'folder'
};

function pageIcon(p) {
  if (p.path.toLowerCase().endsWith('.pdf')) return 'pdf';
  return catIcons[p.cat] || 'desc';
}

// API STORAGE
let pages = [];

async function loadPages() {
  try {
    const res = await fetch('/api/pages');
    if (!res.ok) throw new Error();
    const data = await res.json();
    if (Array.isArray(data) && data.length > 0) {
      pages = data;
    } else {
      pages = DEFAULT_PAGES.slice();
      await savePages();
    }
  } catch {
    pages = DEFAULT_PAGES.slice();
  }
  renderNav();
  renderTabs();
}

async function savePages() {
  try {
    await fetch('/api/pages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(pages)
    });
  } catch { /* API nicht erreichbar */ }
}
let openTabs = [], activeTabId = null, ctxTargetId = null;

let sortableInstances = [];

function renderNav(filter = '') {
  // Sortable-Instanzen aufräumen
  sortableInstances.forEach(s => s.destroy());
  sortableInstances = [];

  const list = document.getElementById('nav-list');
  list.innerHTML = '';
  const q = filter.toLowerCase();
  const grouped = {};
  cats.forEach(c => grouped[c] = []);
  grouped['_other'] = [];
  pages.forEach(p => {
    if (q && !p.title.toLowerCase().includes(q) && !p.cat.toLowerCase().includes(q)) return;
    (grouped[p.cat] ?? grouped['_other']).push(p);
  });

  let total = 0;
  Object.entries(grouped).forEach(([cat, items]) => {
    if (!items.length) return;
    total += items.length;

    const lbl = document.createElement('div');
    lbl.className = 'nav-section-label';
    lbl.textContent = cat === '_other' ? 'Sonstige' : cat;
    list.appendChild(lbl);

    // Container pro Kategorie — Sortable-Gruppe
    const group = document.createElement('div');
    group.className = 'nav-group';
    group.dataset.cat = cat;
    list.appendChild(group);

    items.forEach(p => {
      const el = document.createElement('div');
      el.className = 'nav-item' + (p.id === activeTabId ? ' active' : '');
      el.dataset.id = p.id;
      el.innerHTML = `
        <svg class="icon icon-sm drag-handle"><use href="#i-drag"></use></svg>
        <svg class="icon icon-md"><use href="#i-${pageIcon(p)}"></use></svg>
        <span class="nav-label">${p.title}</span>
        <span class="nav-badge">${p.cat}</span>`;
      el.addEventListener('click', () => openPage(p.id));
      el.addEventListener('contextmenu', e => openCtxMenu(e, p.id));
      group.appendChild(el);
    });

    // Nur sortieren wenn kein Filter aktiv
    if (!q) {
      const s = new Sortable(group, {
        group: 'nav',          // gemeinsame Gruppe → zwischen Kategorien ziehen
        animation: 150,
        handle: '.drag-handle',
        ghostClass: 'nav-item-ghost',
        onEnd(evt) {
          const fromCat = evt.from.dataset.cat;
          const toCat   = evt.to.dataset.cat;
          const id      = parseInt(evt.item.dataset.id);

          // Kategorie updaten falls gewechselt
          const p = pages.find(x => x.id === id);
          if (p && fromCat !== toCat) {
            p.cat = toCat === '_other' ? 'Sonstiges' : toCat;
          }

          // Reihenfolge aus dem DOM lesen und pages-Array neu sortieren
          const newOrder = [];
          list.querySelectorAll('.nav-group').forEach(grp => {
            grp.querySelectorAll('.nav-item').forEach(el => {
              const found = pages.find(x => x.id === parseInt(el.dataset.id));
              if (found) newOrder.push(found);
            });
          });
          // Seiten die im Filter nicht sichtbar sind hinten anhängen
          pages.forEach(p => { if (!newOrder.find(x => x.id === p.id)) newOrder.push(p); });
          pages.length = 0;
          newOrder.forEach(p => pages.push(p));

          savePages();
          renderNav(document.getElementById('search-input').value);
        }
      });
      sortableInstances.push(s);
    }
  });

  document.getElementById('status-count').textContent = `${total} Seite${total !== 1 ? 'n' : ''}`;
  renderQuickCards();
}

function renderQuickCards() {
  const grid = document.getElementById('quick-cards');
  grid.innerHTML = '';
  pages.slice(0, 8).forEach(p => {
    const c = document.createElement('div');
    c.className = 'quick-card';
    c.innerHTML = `
      <svg class="icon"><use href="#i-${pageIcon(p)}"></use></svg>
      <div class="card-label">${p.title}</div>
      <div class="card-sub">${p.cat}</div>`;
    c.addEventListener('click', () => openPage(p.id));
    grid.appendChild(c);
  });
}

function renderTabs() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = '';
  openTabs.forEach(t => {
    const p = pages.find(x => x.id === t.id);
    if (!p) return;
    const tab = document.createElement('div');
    tab.className = 'tab' + (t.id === activeTabId ? ' active' : '');
    tab.innerHTML = `<span>${p.title}</span><svg class="icon icon-sm tab-close"><use href="#i-close"></use></svg>`;
    tab.addEventListener('click', e => {
      if (e.target.closest('.tab-close')) { closeTab(t.id); return; }
      switchTab(t.id);
    });
    bar.appendChild(tab);
  });
}

function isPDF(path) { return path.toLowerCase().endsWith('.pdf'); }

function openPage(id) {
  const p = pages.find(x => x.id === id);
  if (!p) return;
  document.getElementById('welcome').style.display = 'none';
  let tab = openTabs.find(t => t.id === id);
  if (!tab) {
    let el;
    if (isPDF(p.path)) {
      el = document.createElement('object');
      el.data = p.path;
      el.type = 'application/pdf';
      el.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:none;display:none;background:#fff';
    } else {
      el = document.createElement('iframe');
      el.src = p.path;
      el.title = p.title;
    }
    document.getElementById('frame-container').appendChild(el);
    tab = { id, iframeEl: el };
    openTabs.push(tab);
  }
  switchTab(id);
}

function switchTab(id) {
  activeTabId = id;
  openTabs.forEach(t => t.iframeEl.classList.toggle('active', t.id === id));
  const p = pages.find(x => x.id === id);
  document.getElementById('status-page').textContent = p ? p.title : '';
  renderTabs();
  renderNav(document.getElementById('search-input').value);
}

function closeTab(id) {
  const t = openTabs.find(x => x.id === id);
  if (t) t.iframeEl.remove();
  openTabs = openTabs.filter(x => x.id !== id);
  if (activeTabId === id) {
    activeTabId = openTabs.length ? openTabs[openTabs.length - 1].id : null;
    if (activeTabId) { switchTab(activeTabId); }
    else {
      document.getElementById('welcome').style.display = 'flex';
      document.getElementById('status-page').textContent = 'Keine Seite geöffnet';
    }
  }
  renderTabs();
  renderNav(document.getElementById('search-input').value);
}

const ctxMenu = document.getElementById('ctx-menu');
let editingId = null;

function openDialog(id = null) {
  editingId = id;
  const p = id ? pages.find(x => x.id === id) : null;
  document.getElementById('dialog-title').textContent = id ? 'Seite bearbeiten' : 'Seite hinzufügen';
  document.getElementById('d-title').value  = p?.title ?? '';
  document.getElementById('d-path').value   = p?.path  ?? '';
  document.getElementById('d-newcat').value = '';
  document.getElementById('d-delete').style.display = id ? '' : 'none';
  const sel = document.getElementById('d-cat');
  sel.innerHTML = cats.map(c => `<option value="${c}" ${p?.cat === c ? 'selected' : ''}>${c}</option>`).join('');
  document.getElementById('dialog-overlay').classList.add('open');
  document.getElementById('d-title').focus();
}

function closeDialog() {
  document.getElementById('dialog-overlay').classList.remove('open');
  editingId = null;
}

document.getElementById('btn-add').addEventListener('click', () => openDialog());
document.getElementById('d-cancel').addEventListener('click', closeDialog);
document.getElementById('dialog-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('dialog-overlay')) closeDialog();
});

document.getElementById('d-save').addEventListener('click', () => {
  const title  = document.getElementById('d-title').value.trim();
  const path   = document.getElementById('d-path').value.trim();
  let   cat    = document.getElementById('d-cat').value;
  const newcat = document.getElementById('d-newcat').value.trim();
  if (!title || !path) { alert('Titel und Pfad sind Pflichtfelder.'); return; }
  if (newcat && !cats.includes(newcat)) cats.push(newcat);
  if (newcat) cat = newcat;
  if (editingId) {
    const p = pages.find(x => x.id === editingId);
    if (p) { p.title = title; p.path = path; p.cat = cat; }
    const t = openTabs.find(x => x.id === editingId);
    if (t) t.iframeEl.src = path;
  } else {
    const nextId = Math.max(0, ...pages.map(p => p.id)) + 1;
    pages.push({ id: nextId, title, path, cat });
  }
  closeDialog();
  savePages();
  renderNav(document.getElementById('search-input').value);
  renderTabs();
});

document.getElementById('d-delete').addEventListener('click', () => {
  if (!editingId || !confirm('Seite entfernen?')) return;
  closeTab(editingId);
  const idx = pages.findIndex(x => x.id === editingId);
  if (idx !== -1) pages.splice(idx, 1);
  closeDialog();
  savePages();
  renderNav(document.getElementById('search-input').value);
});
function openCtxMenu(e, id) {
  e.preventDefault();
  ctxTargetId = id;
  ctxMenu.style.left = Math.min(e.clientX, window.innerWidth  - 192) + 'px';
  ctxMenu.style.top  = Math.min(e.clientY, window.innerHeight - 120) + 'px';
  ctxMenu.classList.add('open');
}
document.getElementById('ctx-open').addEventListener('click', () => { openPage(ctxTargetId); ctxMenu.classList.remove('open'); });
document.getElementById('ctx-edit').addEventListener('click', () => { openDialog(ctxTargetId); ctxMenu.classList.remove('open'); });
document.getElementById('ctx-close-tab').addEventListener('click', () => { closeTab(ctxTargetId); ctxMenu.classList.remove('open'); });
document.getElementById('ctx-delete').addEventListener('click', () => {
  if (!confirm('Eintrag dauerhaft aus der Liste entfernen?')) { ctxMenu.classList.remove('open'); return; }
  closeTab(ctxTargetId);
  const idx = pages.findIndex(x => x.id === ctxTargetId);
  if (idx !== -1) pages.splice(idx, 1);
  savePages();
  renderNav(document.getElementById('search-input').value);
  ctxMenu.classList.remove('open');
});
document.addEventListener('click', () => ctxMenu.classList.remove('open'));

document.getElementById('toggle-nav').addEventListener('click', () => {
  document.getElementById('nav').classList.toggle('collapsed');
});
document.getElementById('search-input').addEventListener('input', e => renderNav(e.target.value));
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { ctxMenu.classList.remove('open'); closeDialog(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'w' && activeTabId) { e.preventDefault(); closeTab(activeTabId); }
});

// ── UPLOAD ──────────────────────────────────────────────────────────────────
function showToast(msg, icon = 'hourglass') {
  const t = document.getElementById('upload-toast');
  t.querySelector('.icon use').setAttribute('href', '#i-' + icon);
  document.getElementById('upload-toast-msg').textContent = msg;
  t.classList.add('show');
}
function hideToast() { document.getElementById('upload-toast').classList.remove('show'); }

async function uploadFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['html','htm','pdf'].includes(ext)) {
    showToast('Nur HTML und PDF erlaubt', 'error'); setTimeout(hideToast, 3000); return;
  }
  showToast('Wird hochgeladen…', 'hourglass');
  const fd = new FormData();
  fd.append('file', file);
  try {
    const res = await fetch('/api/upload', { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Fehler');
    showToast('Hochgeladen: ' + file.name, 'check');
    setTimeout(hideToast, 3000);
    // Dialog vorausfüllen
    document.getElementById('d-title').value = file.name.replace(/\.[^.]+$/, '');
    document.getElementById('d-path').value  = data.path;
    document.getElementById('d-newcat').value = '';
    document.getElementById('d-delete').style.display = 'none';
    document.getElementById('dialog-title').textContent = 'Seite hinzufügen';
    const sel = document.getElementById('d-cat');
    sel.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
    document.getElementById('dialog-overlay').classList.add('open');
    document.getElementById('d-title').focus();
  } catch(e) {
    showToast('Fehler: ' + e.message, 'error'); setTimeout(hideToast, 4000);
  }
}

const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) uploadFile(e.target.files[0]); });
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) uploadFile(file);
});
// File-Drop von überall auf der Seite — nur für Dateien, nicht für SortableJS
document.addEventListener('dragover', e => {
  if (e.dataTransfer && e.dataTransfer.types.includes('Files')) e.preventDefault();
});
document.addEventListener('drop', e => {
  if (!e.dataTransfer || !e.dataTransfer.types.includes('Files')) return;
  e.preventDefault();
  if (e.target.closest('#drop-zone')) return; // Drop-Zone verarbeitet das selbst
  const file = e.dataTransfer.files[0];
  if (file) uploadFile(file);
});

(function () {
  const sz = 64, mid = sz / 2;
  const cv = document.createElement('canvas');
  cv.width = cv.height = sz;
  const g = cv.getContext('2d');

  g.fillStyle = '#1A2530';
  g.beginPath();
  g.roundRect(0, 0, sz, sz, 12);
  g.fill();

  g.translate(mid, mid);
  g.rotate(Math.PI);
  g.translate(-mid, -mid);

  // left page (lighter)
  g.beginPath();
  g.moveTo(mid,  9); g.lineTo(5,  15); g.lineTo(5,  51); g.lineTo(mid, 47);
  g.closePath();
  g.fillStyle = '#CCE5FF';
  g.fill();

  // right page (primary blue)
  g.beginPath();
  g.moveTo(mid,  9); g.lineTo(59, 15); g.lineTo(59, 51); g.lineTo(mid, 47);
  g.closePath();
  g.fillStyle = '#92CBFF';
  g.fill();

  // text lines
  g.strokeStyle = '#355269';
  g.lineWidth = 2;
  g.lineCap = 'round';
  [22, 30, 38].forEach(y => {
    g.beginPath(); g.moveTo(10, y);      g.lineTo(mid - 4, y - 0.5); g.stroke();
    g.beginPath(); g.moveTo(mid + 4, y - 0.5); g.lineTo(54, y);      g.stroke();
  });

  // spine
  g.fillStyle = '#004A72';
  g.fillRect(mid - 2, 7, 4, 42);

  const lnk = document.getElementById('favicon');
  lnk.href = cv.toDataURL();
})();

loadPages();
