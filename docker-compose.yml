services:
  kbase:
    image: nginx:alpine
    container_name: kbase
    restart: unless-stopped
    volumes:
      - ./www:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/docs:/usr/share/nginx/html/docs:ro
    ports:
      - "8095:80"
    depends_on:
      - kbase-api

  kbase-api:
    build: ./api
    container_name: kbase-api
    restart: unless-stopped
    volumes:
      - ./data:/data
