services:
  dokubase:
    image: nginx:alpine
    container_name: dokubase
    restart: unless-stopped
    volumes:
      - ./www:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/docs:/usr/share/nginx/html/docs:ro
    ports:
      - "8095:80"
    depends_on:
      - dokubase-api

  dokubase-api:
    build: ./api
    container_name: dokubase-api
    restart: unless-stopped
    volumes:
      - ./data:/data
